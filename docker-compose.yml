services:
  nanoclaw:
    build: .
    container_name: nanoclaw
    restart: unless-stopped

    volumes:
      # Persistent storage — WhatsApp auth, SQLite DB, group workspaces
      - ./store:/app/store
      - ./data:/app/data
      - ./groups:/app/groups
      - ./logs:/app/logs
      # Docker socket so nanoclaw can spawn agent sub-containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared workspace mounts
      - /Users/mac/Development:/workspace/extra/Development
      - /Users/mac/Projects:/workspace/extra/Projects

    environment:
      - NODE_ENV=production

    depends_on:
      - litellm

    networks:
      - nanoclaw-net

  # ── LiteLLM — unified cloud model gateway ─────────────────────────────
  # Routes all AI calls (Anthropic, OpenRouter, Gemini) through one endpoint
  # PHP agents call http://litellm:4000/v1/chat/completions (OpenAI format)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped

    volumes:
      - ./litellm/config.yaml:/app/config.yaml

    command: --config /app/config.yaml --port 4000 --num_workers 4

    env_file:
      - .env

    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-litellm-pillai-2026}

    ports:
      - "4000:4000"

    networks:
      - nanoclaw-net

networks:
  nanoclaw-net:
    driver: bridge
